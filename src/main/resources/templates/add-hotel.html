<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add New Hotel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">Hotel Booking</a>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4">
                <h2 class="mb-4">Register New Hotel</h2>
                <form th:action="@{/admin/save-hotel}" method="post" th:object="${hotel}">
                    <div class="mb-3">
                        <label class="form-label">Hotel Name</label>
                        <input type="text" th:field="*{name}" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">City</label>
                        <input type="text" th:field="*{city}" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Address</label>
                        <label>
                            <input type="text" th:field="*{address}" class="form-control" required>
                        </label>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <label>
                            <textarea th:field="*{description}" class="form-control" rows="3"></textarea>
                        </label>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Rating (1-5)</label>
                        <label>
                            <input type="number" step="0.1" th:field="*{rating}" class="form-control" min="1" max="5" required>
                        </label>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Save Hotel</button>
                    <a href="/hotels" class="btn btn-link w-100 mt-2">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>

</body>
</html>
