<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add New Room</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">Hotel Booking</a>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4">
                <h2 class="mb-4">Add Room to Hotel</h2>
                <form th:action="@{/admin/save-room}" method="post" th:object="${room}">
                    <!-- passes the Hotel ID as a simple parameter -->
                    <input type="hidden" name="hotelId" th:value="${room.hotel.id}">

                    <div class="mb-3">
                        <label class="form-label text-muted">Room Number</label>
                        <label>
                            <input type="text" class="form-control" value="Auto-generated in order" disabled>
                        </label>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Room Type</label>
                        <select th:field="*{roomType}" class="form-select">
                            <option value="Deluxe Suite">Deluxe Suite</option>
                            <option value="Executive Room">Executive Room</option>
                            <option value="Standard Room">Standard Room</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Price per Night (RS.)</label>
                        <label>
                            <input type="number" step="0.01" th:field="*{price}" class="form-control" required>
                        </label>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Availability</label>
                        <label>
                            <select th:field="*{available}" class="form-select">
                                <option value="true">Available</option>
                                <option value="false">Not Available</option>
                            </select>
                        </label>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Save Room</button>
                    <a th:href="@{/rooms/{id}(id=${room.hotel.id})}" class="btn btn-link w-100 mt-2">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>

</body>
</html>
