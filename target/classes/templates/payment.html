<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Payment - Hotel Booking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">Hotel Booking</a>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card p-4 shadow-sm">
                <h3 class="mb-4">Complete Payment</h3>
                <div class="alert alert-info py-2">
                    <strong>Total Amount:</strong> <span th:text="'RS. ' + ${payment.amount}"></span>
                </div>
                
                <form th:action="@{/user/process-payment}" method="post" th:if="${payment.booking != null}">
                    <input type="hidden" name="bookingId" th:value="${payment.booking.id}">
                    <input type="hidden" name="amount" th:value="${payment.amount}">
                    
                    <div class="mb-3">
                        <label class="form-label">Card Holder Name</label>
                        <input type="text" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Card Number</label>
                        <input type="text" class="form-control" placeholder="1234 5678 9101 1121" required>
                    </div>
                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label">Expiry Date</label>
                            <input type="text" class="form-control" placeholder="MM/YY" required>
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label">CVV</label>
                            <input type="text" class="form-control" placeholder="123" required>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-success w-100 btn-lg">Pay Now</button>
                    <p class="text-center mt-3 text-muted small">Simulated Stripe Payment Integration</p>
                </form>
                <div th:if="${payment.booking == null}" class="alert alert-danger">
                    Error: Booking information not found. Please try again.
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
