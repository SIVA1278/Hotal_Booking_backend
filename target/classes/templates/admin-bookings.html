<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>All Bookings - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand" href="/admin/dashboard">Admin Portal</a>
        <div class="ms-auto d-flex gap-2">
            <a href="/logout" class="btn btn-outline-light btn-sm">Logout</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>All System Reservations</h2>
        <a href="/admin/dashboard" class="btn btn-secondary">Back to Dashboard</a>
    </div>

    <div class="card shadow-sm overflow-hidden">
        <table class="table table-hover mb-0">
            <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>Customer</th>
                    <th>Hotel & Room</th>
                    <th>Check-in</th>
                    <th>Check-out</th>
                    <th class="text-center">Status</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="booking : ${bookings}">
                    <td th:text="'#' + ${booking.id}"></td>
                    <td>
                        <div th:text="${booking.user.name}" class="fw-bold"></div>
                        <small class="text-muted" th:text="${booking.user.email}"></small>
                    </td>
                    <td>
                        <div th:text="${booking.room.hotel.name}" class="fw-bold"></div>
                        <small class="text-muted" th:text="'Room ' + ${booking.room.roomNumber}"></small>
                    </td>
                    <td th:text="${booking.checkInDate}"></td>
                    <td th:text="${booking.checkOutDate}"></td>
                    <td class="text-center">
                        <span th:if="${booking.status.name() == 'CONFIRMED'}" class="badge bg-success">Confirmed</span>
                        <span th:if="${booking.status.name() == 'PENDING'}" class="badge bg-warning text-dark">Pending</span>
                        <span th:if="${booking.status.name() == 'CANCELLED'}" class="badge bg-danger">Cancelled</span>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(bookings)}">
                    <td colspan="6" class="text-center py-5 text-muted">No bookings found in the system.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
