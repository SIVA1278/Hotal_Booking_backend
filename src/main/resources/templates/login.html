<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - Hotel Booking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container">
    <div class="row justify-content-center align-items-center" style="min-height: 80vh;">
        <div class="col-md-4">
            <div class="card p-4 shadow-sm">
                <h3 class="text-center mb-4">Login</h3>
                <form th:action="@{/login}" method="post">
                    <div class="mb-3">
                        <label class="form-label">Email Address</label>
                        <label>
                            <input type="email" name="username" class="form-control" required>
                        </label>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <label>
                            <input type="password" name="password" class="form-control" required>
                        </label>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Sign In</button>
                    
                    <div th:if="${param.registered}" class="alert alert-success mt-3 py-2 small">
                        Registration successful! Please log in.
                    </div>
                    <div th:if="${param.logout}" class="alert alert-info mt-3 py-2 small">
                        You have been logged out successfully.
                    </div>
                    
                    <div th:if="${param.error}" class="alert alert-danger mt-3 py-2 small">
                        Invalid email or password.
                    </div>

                    <div class="text-center mt-3 small">
                        Don't have an account? <a href="/register">Register here</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

</body>
</html>
