<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Profile - LUXE STAY</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height: 100vh; padding: 2rem 0;">

<div class="container animate-fade-in">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="text-center mb-5">
                <div class="d-inline-block p-3 glass-card rounded-circle mb-3">
                    <i class="bi bi-person-circle display-4 text-accent"></i>
                </div>
                <h1 class="fw-bold text-white mb-2">Personal Settings</h1>
                <p class="text-muted">Manage your identity and security</p>
            </div>

            <div class="glass-card p-4 p-md-5">
                <form th:action="@{/user/update-profile}" method="post" th:object="${user}">
                    <input type="hidden" th:field="*{id}">

                    <div class="mb-4">
                        <label class="form-label text-muted small text-uppercase fw-bold">Full Name</label>
                        <input type="text" th:field="*{name}" class="form-control form-control-lg" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label text-muted small text-uppercase fw-bold">Email Address</label>
                        <input type="email" th:field="*{email}" class="form-control form-control-lg opacity-50" readonly>
                        <div class="form-text text-muted small">Email cannot be changed for security reasons.</div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label text-muted small text-uppercase fw-bold">Update Password</label>
                        <input type="password" th:field="*{password}" class="form-control form-control-lg" placeholder="Enter new password">
                    </div>

                    <button type="submit" class="btn btn-primary w-100 btn-lg mb-4">Save Changes</button>
                    
                    <div class="text-center">
                        <a href="/home" class="text-muted small text-decoration-none"><i class="bi bi-arrow-left"></i> Return to Home</a>
                    </div>
                </form>
            </div>
            
            <div class="text-center mt-4">
                <a href="/my-bookings" class="btn btn-outline-light btn-sm px-4">View My Reservations</a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
