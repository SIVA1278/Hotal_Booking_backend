<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">Admin Portal</a>
        <div class="ms-auto">
            <a href="/logout" class="btn btn-outline-light btn-sm">Logout</a>
        </div>
    </div>
</nav>

<div class="container">
    <h2 class="mb-4">System Overview</h2>

    <div class="row g-4 mb-5">
        <div class="col-md-3">
            <div class="card text-center p-4 bg-primary text-white border-0">
                <h1 th:text="${totalUsers}"></h1>
                <p class="mb-0">Users</p>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-center p-4 bg-success text-white border-0">
                <h1 th:text="${totalHotels}"></h1>
                <p class="mb-0">Hotels</p>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-center p-4 bg-info text-white border-0">
                <h1 th:text="${totalBookings}"></h1>
                <p class="mb-0">Bookings</p>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-center p-4 bg-warning text-white border-0">
                <h1 th:text="${totalPayments}"></h1>
                <p class="mb-0">Payments</p>
            </div>
        </div>
    </div>

    <div class="card p-4">
        <h3>Quick Actions</h3>
        <hr>
        <div class="d-flex gap-3">
            <a href="/admin/add-hotel" class="btn btn-primary">Add New Hotel</a>
            <a href="/hotels" class="btn btn-secondary">Manage Rooms</a>
            <a href="/admin/all-bookings" class="btn btn-info text-white">View All Bookings</a>
        </div>
    </div>
</div>

</body>
</html>
