<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Available Rooms</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">Hotel Booking</a>
        <div class="ms-auto">
            <a href="/hotels" class="btn btn-outline-light btn-sm">Back to Hotels</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2>Available Rooms</h2>
            <p class="text-muted">Explore the room options for this property.</p>
        </div>
        <div sec:authorize="hasAuthority('ADMIN')">
            <!-- Passes the current hotel ID to the add-room form -->
            <a th:href="@{/admin/add-room/{id}(id=${hotelId})}" class="btn btn-success">+ Add Another Room</a>
        </div>
    </div>

    <div class="row">
        <div class="col-md-4 mb-4" th:each="room : ${rooms}">
            <div class="card h-100 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title fw-bold" th:text="'Room ' + ${room.roomNumber}"></h5>
                    <h6 class="card-subtitle mb-2 text-muted" th:text="${room.roomType}"></h6>
                    <hr>
                    <p class="card-text">
                        <strong>Price:</strong> <span class="text-primary h5" th:text="'RS. ' + ${room.price}"></span> <small>/ night</small>
                    </p>
                    <p class="card-text">
                        <strong>Status:</strong> 
                        <span th:if="${room.available}" class="badge bg-success">Available</span>
                        <span th:unless="${room.available}" class="badge bg-secondary">Booked</span>
                    </p>
                    
                    <a th:if="${room.available}" th:href="@{/user/book-room/{id}(id=${room.id})}" class="btn btn-primary w-100 mt-2">Book Now</a>
                    <button th:unless="${room.available}" class="btn btn-secondary w-100 mt-2" disabled>Not Available</button>
                </div>
            </div>
        </div>
        <div class="col-12 text-center py-5" th:if="${#lists.isEmpty(rooms)}">
            <h4 class="text-muted">No rooms available for this hotel yet.</h4>
            <a href="/admin/add-room" class="btn btn-info text-white mt-2" sec:authorize="hasAuthority('ADMIN')">Add First Room</a>
        </div>
    </div>
</div>

</body>
</html>
