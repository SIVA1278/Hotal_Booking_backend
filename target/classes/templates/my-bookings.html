<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Bookings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">Hotel Booking</a>
        <div class="ms-auto d-flex gap-2">
            <a href="/hotels" class="btn btn-outline-light btn-sm">Book More</a>
            <a href="/logout" class="btn btn-outline-light btn-sm">Logout</a>
        </div>
    </div>
</nav>

<div class="container">
    <div th:if="${param.success}" class="alert alert-success alert-dismissible fade show">
        Payment successful! Your booking is confirmed.
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show">
        There was an issue processing your payment. Please try again.
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <h2 class="mb-4">Your Reservations</h2>

    <div class="card shadow-sm overflow-hidden">
        <table class="table table-hover mb-0">
            <thead class="table-light">
                <tr>
                    <th>Hotel & Room</th>
                    <th>Check-in</th>
                    <th>Check-out</th>
                    <th class="text-center">Status</th>
                    <th class="text-end">Action</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="booking : ${bookings}">
                    <td>
                        <div th:text="${booking.room.hotel.name}" class="fw-bold"></div>
                        <small class="text-muted" th:text="'Room ' + ${booking.room.roomNumber}"></small>
                    </td>
                    <td th:text="${booking.checkInDate}"></td>
                    <td th:text="${booking.checkOutDate}"></td>
                    <td class="text-center">
                        <span th:if="${booking.status.name() == 'CONFIRMED'}" class="badge bg-success">Confirmed</span>
                        <span th:if="${booking.status.name() == 'PENDING'}" class="badge bg-warning text-dark">Pending</span>
                        <span th:if="${booking.status.name() == 'CANCELLED'}" class="badge bg-danger">Cancelled</span>
                    </td>
                    <td class="text-end">
                        <a th:if="${booking.status.name() != 'CANCELLED'}" 
                           th:href="@{/user/cancel-booking/{id}(id=${booking.id})}" 
                           class="btn btn-outline-danger btn-sm"
                           onclick="return confirm('Cancel this booking?')">Cancel</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(bookings)}">
                    <td colspan="5" class="text-center py-5 text-muted">You have no bookings yet.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
